<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Frigo MVP" }}</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f5f1e8; color: #222; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1, h2, h3 { margin-top: 0; }
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card { background: #fffaf0; border: 1px solid #e6dcc8; border-radius: 16px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e6dcc8; font-size: 14px; }
    input, button, textarea { font: inherit; padding: 10px; border-radius: 10px; border: 1px solid #cdbf9f; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: #2f5d50; color: white; border: none; width: auto; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .muted { color: #6b665c; font-size: 14px; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #efe7d3; font-size: 12px; margin-right: 4px; }
    .step-nav { display: flex; justify-content: space-between; margin-top: 20px; }
  </style>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
