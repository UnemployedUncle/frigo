services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frigo
      POSTGRES_USER: frigo
      POSTGRES_PASSWORD: frigo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frigo -d frigo"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://frigo:frigo@db:5432/frigo
    ports:
      - "8000:8000"

volumes:
  postgres_data:
