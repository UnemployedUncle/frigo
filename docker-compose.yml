services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frigo
      POSTGRES_USER: frigo
      POSTGRES_PASSWORD: frigo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://frigo:frigo@db:5432/frigo
    ports:
      - "8000:8000"

volumes:
  postgres_data:
